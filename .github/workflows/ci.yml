name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma clients
        run: |
          cd services/games && bunx prisma generate
          cd ../../services/wallets && bunx prisma generate

      - name: Lint frontend
        run: cd frontend && bun run lint

      - name: Build frontend
        run: cd frontend && bun run build

  unit-tests-games:
    name: Unit Tests — Games Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: cd services/games && bunx prisma generate

      - name: Run unit tests
        run: cd services/games && bun test tests/unit

  unit-tests-wallets:
    name: Unit Tests — Wallets Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: cd services/wallets && bunx prisma generate

      - name: Run unit tests
        run: cd services/wallets && bun test tests/unit

  e2e-tests:
    name: E2E Tests — Playwright
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests-games, unit-tests-wallets]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: cd packages/e2e && npx playwright install --with-deps chromium

      - name: Start stack with deterministic crash points
        run: bun run docker:test

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/games/health > /dev/null 2>&1 && \
               curl -sf http://localhost:8000/wallets/health > /dev/null 2>&1 && \
               curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "All services are ready!"
              break
            fi
            echo "Attempt $i/60 — waiting 5s..."
            sleep 5
          done

      - name: Run Playwright E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

      - name: Stop stack
        if: always()
        run: bun run docker:down
