global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "games-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["games:4001"]
        labels:
          service: games

  - job_name: "wallets-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["wallets:4002"]
        labels:
          service: wallets
